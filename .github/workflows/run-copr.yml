name: Update Copr Packages

on:
  schedule:
    # Run every 6 hours (at 00:00, 06:00, 12:00, and 18:00 UTC)
    - cron: '0 */6 * * *'

  workflow_dispatch:
    inputs:
      package:
        description: 'Package to rebuild (leave empty to auto-detect changes)'
        required: false
        type: choice
        options:
          - ''
          - all
          - cliphist
          - dankcalendar-git
          - ghostty
          - matugen
          - niri
          - niri-git
          - quickshell
          - quickshell-git
          - xwayland-satellite
          - xwayland-satellite-git
        default: ''
      rebuild_release:
        description: "Release number for COPR rebuilds (e.g., 2, 3, 4)."
        required: false
        default: ''

  push:
    branches:
      - master
    paths:
      - '.github/workflows/run-copr.yml'
      - 'distro/scripts/copr/copr-update.sh'
      - 'distro/scripts/common/fetch-version.sh'
      - 'distro/scripts/copr/copr-trigger.sh'
      - 'distro/snapshots.yaml'
      - 'distro/fedora/**/*.spec'

jobs:
  update-packages:
    name: Check for package updates
    runs-on: ubuntu-latest
    container:
      image: fedora:44

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    permissions:
      contents: write

    outputs:
      has_changes: ${{ steps.update.outputs.has_changes }}
      spec_changes: ${{ steps.check_push.outputs.spec_changes }}

    steps:
      - name: Install dependencies
        run: |
          dnf install -y jq curl git rpmdevtools wget
          wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run update script
        id: update
        env:
          COPR_REBUILD_COUNT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.rebuild_release || '' }}
          COPR_REBUILD_PACKAGE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.package || '' }}
        run: |
          chmod +x distro/scripts/copr/*.sh distro/scripts/common/*.sh
          distro/scripts/copr/copr-update.sh | tee update-log.txt

          # Check only spec file changes — scoped to distro/fedora/ to avoid
          # update-log.txt and other non-spec files triggering false positives
          if git diff --exit-code -- distro/fedora/ >/dev/null 2>&1; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "📋 No updates found"
          else
            CHANGES=$(git diff --name-only -- distro/fedora/ | wc -l)
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "📋 Updates detected! ($CHANGES files changed)"
            echo "Changed files:"
            git diff --name-only -- distro/fedora/ | sed 's/^/  - /'
          fi

      - name: Check for spec changes in push
        id: check_push
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Check if any spec files were changed in the push itself
            SPEC_CHANGES=$(git diff HEAD~1 --name-only | grep '\.spec$' || echo "")
            if [[ -n "$SPEC_CHANGES" ]]; then
              echo "spec_changes=true" >> $GITHUB_OUTPUT
              echo "📋 Spec files modified in push:"
              echo "$SPEC_CHANGES" | sed 's/^/  - /'
            else
              echo "spec_changes=false" >> $GITHUB_OUTPUT
              echo "📋 No spec files modified in push"
            fi
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # For manual triggers, check if any spec files differ from previous commit
            SPEC_CHANGES=$(git diff HEAD~1 --name-only | grep '\.spec$' || echo "")
            if [[ -n "$SPEC_CHANGES" ]]; then
              echo "spec_changes=true" >> $GITHUB_OUTPUT
              echo "📋 Spec files modified in recent commit:"
              echo "$SPEC_CHANGES" | sed 's/^/  - /'
            else
              echo "spec_changes=false" >> $GITHUB_OUTPUT
              echo "📋 No spec files modified in recent commits"
            fi
          else
            echo "spec_changes=false" >> $GITHUB_OUTPUT
            echo "📋 Not a push/manual event, skipping spec change check"
          fi

      - name: Debug outputs
        run: |
          echo "=== DEBUG OUTPUTS ==="
          echo "has_changes: ${{ steps.update.outputs.has_changes }}"
          echo "spec_changes: ${{ steps.check_push.outputs.spec_changes }}"
          echo "package: ${{ github.event.inputs.package }}"
          echo "rebuild_release: ${{ github.event.inputs.rebuild_release }}"
          echo "event_name: ${{ github.event_name }}"
          echo ""
          echo "Trigger logic:"
          echo "  - Run COPR triggers if: has_changes OR spec_changes"
          echo "===================="

      - name: Commit and push changes
        if: steps.update.outputs.has_changes == 'true'
        run: |
          # Get list of changed spec files for commit message — scoped to
          # distro/fedora/ so update-log.txt never appears in the list
          CHANGED_SPECS=$(git diff --name-only -- distro/fedora/ | grep '\.spec$' | xargs -r basename -a | tr '\n' ', ' | sed 's/,$//')

          # Stage only the spec directory, not the repo root (avoids committing
          # update-log.txt or any other ephemeral file created during the run)
          git add -- distro/fedora/
          git commit -m "ci: Auto-update Copr specs [$CHANGED_SPECS]

          🤖 Automated by GitHub Actions"

          git push

      - name: Create update summary
        if: steps.update.outputs.has_changes == 'true'
        run: |
          echo "## 📦 Package Updates" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The following packages were updated:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Parse update log for changes
          if grep -q "Update available" update-log.txt; then
            grep "Update available" update-log.txt | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changed Files" >> $GITHUB_STEP_SUMMARY
          git diff HEAD~1 --name-only | grep '\.spec$' | sed 's/^/- `/' | sed 's/$/`/' >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View commit](https://github.com/${{ github.repository }}/commit/$(git rev-parse HEAD))" >> $GITHUB_STEP_SUMMARY

      - name: Upload update log
        if: steps.update.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: update-log-${{ github.run_number }}
          path: update-log.txt
          retention-days: 30

  trigger-copr-builds:
    name: Trigger COPR builds
    needs: update-packages
    runs-on: ubuntu-latest
    if: |
      needs.update-packages.outputs.has_changes == 'true' ||
      needs.update-packages.outputs.spec_changes == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - name: Install COPR CLI
        run: |
          sudo apt-get update -q
          sudo apt-get install -y python3-pip
          pip3 install copr-cli
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configure COPR
        env:
          COPR_CONFIG: ${{ secrets.COPR_CONFIG }}
        run: |
          if [[ -z "$COPR_CONFIG" ]]; then
            echo "❌ COPR_CONFIG secret not set"
            echo "Please add your COPR configuration as a repository secret named COPR_CONFIG"
            exit 1
          fi

          mkdir -p ~/.config
          echo "$COPR_CONFIG" > ~/.config/copr
          chmod 600 ~/.config/copr

      - name: Trigger builds
        env:
          MANUAL_PACKAGE: ${{ github.event.inputs.package }}
        run: |
          chmod +x distro/scripts/copr/*.sh distro/scripts/common/*.sh
          distro/scripts/copr/copr-trigger.sh

      - name: Build summary
        run: |
          echo "## 🚀 COPR Builds Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Builds have been triggered for updated packages." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View builds](https://copr.fedorainfracloud.org/coprs/avengemedia/danklinux/builds/)" >> $GITHUB_STEP_SUMMARY

    outputs:
      has_changes: ${{ needs.update-packages.outputs.has_changes }}
